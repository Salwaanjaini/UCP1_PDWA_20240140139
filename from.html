<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tech Community - Form Anggota</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark custom-navbar shadow-sm sticky-top">
    <div class="container">
      <a class="navbar-brand fw-bold" href="./index.html">Tech Community</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="./index.html">Beranda</a></li>
          <li class="nav-item"><a class="nav-link active" href="./form.html">Form Anggota</a></li>
          <li class="nav-item"><a class="nav-link" href="./gallery.html">Multimedia</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="form-card shadow-sm">
          <div class="mb-4">
            <h1 class="fw-bold">Form Pendaftaran Anggota</h1>
            <p class="text-secondary mb-0">Isi data berikut untuk menjadi anggota baru Tech Community.</p>
          </div>

          <form id="memberForm">
            <div class="mb-3">
              <label for="nama" class="form-label">Nama Lengkap</label>
              <input type="text" class="form-control" id="nama" placeholder="Masukkan nama lengkap" required>
            </div>

            <div class="mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" class="form-control" id="email" placeholder="contoh@email.com" required>
            </div>

            <div class="mb-4">
              <label for="minat" class="form-label">Bidang Minat</label>
              <select class="form-select" id="minat" required>
                <option value="" selected disabled>Pilih bidang minat</option>
                <option value="Web Development">Web Development</option>
                <option value="UI/UX Design">UI/UX Design</option>
                <option value="Data Science">Data Science</option>
                <option value="Cyber Security">Cyber Security</option>
                <option value="Mobile Development">Mobile Development</option>
              </select>
            </div>

            <div class="d-flex flex-wrap gap-3">
              <button type="submit" class="btn btn-primary">Submit Data</button>
              <a href="./index.html" class="btn btn-outline-secondary">Kembali ke Beranda</a>
            </div>
          </form>

          <div id="resultBox" class="result-box mt-4 d-none"></div>
        </div>
      </div>
    </div>
  </main>

  <footer class="text-center py-4 border-top bg-white">
    <p class="mb-0">&copy; 2026 Tech Community. Form input anggota baru.</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./script.js"></script>
</body>
</html>
